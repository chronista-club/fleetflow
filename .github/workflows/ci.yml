name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  MISE_EXPERIMENTAL: 1
  MISE_LOG_LEVEL: info

jobs:
  # ========================================
  # Tier 1: 高速テスト（Docker不要）
  # すべてのpush/PRで実行
  # ========================================
  fast-tests:
    name: 高速テスト
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: protoc のインストール (unison v0.4+ buffa crate 用)
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: mise のインストール
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: mise のセットアップ
        run: mise install

      # macOS GH runner では `~/.cargo/bin/rustup` が `rustup-init` (= installer 本体)
      # を指していて `rustup component add` が unrecognized argument で失敗する
      # (2026-05-06 頃の runner image 更新で全 PR が同症状)。 公式 rustup-init script
      # を non-interactive で実行して proper rustup を上書き install、 component subcommand
      # を使えるようにする。 --default-toolchain none で mise 管理 toolchain と重複回避、
      # --no-modify-path で PATH 改変 skip、 --profile minimal で余計な component を持たない。
      # Linux runner は元々 proper rustup なのでこの step は skip。
      - name: Rust toolchain proper install (macOS workaround)
        if: matrix.os == 'macos-latest'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --no-modify-path --default-toolchain none --profile minimal
          rustup --version

      - uses: Swatinem/rust-cache@v2

      - name: Rustツールのインストール
        run: mise run setup

      - name: フォーマットチェック
        run: mise run fmt-check

      - name: Clippy
        run: mise run clippy

      - name: 高速テスト（単体テスト + CLIテスト）
        run: mise run test

  # ========================================
  # セキュリティ監査
  # ========================================
  security:
    name: セキュリティ監査
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: protoc のインストール (unison v0.4+ buffa crate 用)
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: mise のインストール
        uses: jdx/mise-action@v4

      - name: mise のセットアップ
        run: mise install

      - uses: Swatinem/rust-cache@v2

      - name: cargo-audit インストール
        run: cargo install cargo-audit

      - name: セキュリティ監査
        run: mise run audit

  # ========================================
  # Tier 2: Docker統合テスト
  # main ブランチ push 時のみ実行
  # ========================================
  docker-tests:
    name: Docker統合テスト
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: fast-tests
    steps:
      - uses: actions/checkout@v4

      - name: protoc のインストール (unison v0.4+ buffa crate 用)
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: mise のインストール
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: mise のセットアップ
        run: mise install

      - uses: Swatinem/rust-cache@v2

      - name: Rustツールのインストール
        run: mise run setup

      - name: Docker統合テスト
        run: cargo test --all-features -- --ignored --test-threads=1
        env:
          RUST_LOG: debug

  # ========================================
  # カバレッジ計測
  # ========================================
  coverage:
    name: カバレッジ
    runs-on: ubuntu-latest
    needs: fast-tests
    steps:
      - uses: actions/checkout@v4

      - name: protoc のインストール (unison v0.4+ buffa crate 用)
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # rust version は repo 全体で 1.95 に統一 (.mise.toml / Cargo.toml rust-version と一致)。
      # coverage job だけ mise でなく dtolnay action 経由なので、 ここも 1.95 pin にする。
      - uses: dtolnay/rust-toolchain@1.95
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: カバレッジ計測
        run: cargo llvm-cov --lib --workspace --all-features --lcov --output-path lcov.info

      - name: カバレッジレポートアップロード
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
