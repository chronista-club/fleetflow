[advisories]
ignore = [
    # bytes: BytesMut::reserve integer overflow - bollard 依存、修正待ち
    "RUSTSEC-2026-0007",
    # number_prefix: unmaintained - indicatif 依存
    "RUSTSEC-2025-0119",
    # paste: unmaintained - ratatui 依存
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = [
    "https://github.com/chronista-club/unison-kdl",
]
