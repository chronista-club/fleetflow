# Mise configuration for FleetFlow
# https://mise.jdx.dev/

[tools]
# Rust toolchain
# 1.95: `constant_time_eq@0.4.3` が rustc 1.95+ を要求するため bump。
# Cargo.lock は gitignore 対象で CI は毎回 fresh resolve するため、
# transitive dep の最新要求に追従する必要がある。
rust = "1.95"

[env]
# Rustのデフォルト設定
CARGO_TERM_COLOR = "always"
RUST_BACKTRACE = "1"
CARGO_INCREMENTAL = "0"

# ========================================
# セットアップ・環境構築
# ========================================

[tasks.setup]
description = "開発環境のセットアップ"
run = [
    "rustup component add rustfmt clippy",
    "cargo update",
    "cargo fetch",
]

# ========================================
# フォーマット関連
# ========================================

[tasks.fmt]
description = "コードフォーマットを適用"
run = "cargo fmt --all"

[tasks.fmt-check]
alias = "fc"
description = "フォーマットをチェック（変更なし）"
run = "cargo fmt --all -- --check"

# ========================================
# リント・チェック
# ========================================

[tasks.clippy]
alias = "clip"
description = "Clippyでリント"
run = "cargo clippy --all-targets --all-features -- -D warnings"

# ========================================
# テスト
# ========================================

[tasks.test]
alias = "t"
description = "高速テストを実行（Docker不要）"
run = "cargo test --workspace --lib --all-features && cargo test --test cli_test"

[tasks.test-all]
alias = "ta"
description = "全テストを実行（Docker依存含む）"
run = "cargo test --all-features -- --include-ignored"

[tasks.test-docker]
alias = "td"
description = "Docker依存テストのみ実行"
run = "cargo test --all-features -- --ignored"

[tasks.test-watch]
alias = "tw"
description = "watchモードでテスト"
run = "cargo watch -x 'test --workspace --lib'"

# ========================================
# ビルド
# ========================================

[tasks.build]
alias = "b"
description = "ビルド"
run = "cargo build --all-features"

[tasks.build-release]
alias = "br"
description = "リリースビルド"
run = "cargo build --release --all-features"

# ========================================
# CI/CD関連
# ========================================

[tasks.ci]
description = "すべてのCIチェックを実行"
depends = ["fmt-check", "clippy", "test", "build"]
run = "echo '✅ すべてのチェックが完了しました'"

[tasks.pre-pr]
alias = "pr"
description = "プルリク前のチェック"
depends = ["fmt", "ci"]
run = "echo '✨ プルリクエストの準備が完了しました'"

[tasks.pre-commit]
alias = "pc"
description = "コミット前のチェック"
depends = ["fmt", "clippy"]

# ========================================
# ドキュメント・監査
# ========================================

[tasks.doc]
description = "ドキュメントを生成して開く"
run = "cargo doc --all-features --no-deps --open"

[tasks.audit]
description = "セキュリティ監査"
# cargo-audit 0.22+ は audit.toml を読まないため、--ignore CLI flag で指定する
# 各 advisory の経路・対応方針は audit.toml にドキュメント化
# 将来 upstream が audit.toml 対応を復活させた場合、CLI flag を削除して一本化する
run = """
cargo audit \
  --ignore RUSTSEC-2024-0436 \
  --ignore RUSTSEC-2025-0134 \
  --ignore RUSTSEC-2026-0002 \
  --ignore RUSTSEC-2023-0071 \
  --ignore RUSTSEC-2026-0044 \
  --ignore RUSTSEC-2026-0048 \
  --ignore RUSTSEC-2026-0098 \
  --ignore RUSTSEC-2026-0099 \
  --ignore RUSTSEC-2026-0104
"""

[tasks.tree]
description = "依存関係ツリーを表示"
run = "cargo tree"

[tasks.udeps]
description = "未使用の依存関係をチェック"
run = "cargo +nightly udeps --all-targets"

# ========================================
# クリーンアップ
# ========================================

[tasks.clean]
description = "ビルドアーティファクトを削除"
run = "cargo clean"

# ========================================
# 開発用
# ========================================

[tasks.dev]
alias = "d"
description = "開発モードで実行"
run = "cargo run"

[tasks.watch]
alias = "w"
description = "watchモードで実行"
run = "cargo watch -x run"

[tasks.bench]
description = "ベンチマーク実行"
run = "cargo bench"
